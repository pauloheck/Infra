###############################################################################
# Service — BeeAI Gateway (único LoadBalancer público)
# API, AI Service e Web são ClusterIP — acesso somente via este gateway.
###############################################################################
apiVersion: v1
kind: Service
metadata:
  name: beeai-gateway
  namespace: beeai
  labels:
    app: beeai-gateway
spec:
  type: LoadBalancer
  selector:
    app: beeai-gateway
  ports:
    - name: http
      port: 80
      targetPort: 80
