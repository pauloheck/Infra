###############################################################################
# Deployment — BeeAI API
# Imagem: acrbeeaidev.azurecr.io/beeai-api:<TAG>   (substituir TAG no deploy)
###############################################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: beeai-api
  namespace: beeai
  labels:
    app: beeai-api
    version: "latest"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: beeai-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: beeai-api
    spec:
      serviceAccountName: default
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: api
          image: acrbeeaidev.azurecr.io/beeai-api:latest   # substituído pelo CI/CD
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: api-config
          env:
            # Secrets injetados do Azure Key Vault via CSI driver
            - name: DB_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: beeai-secrets
                  key: DB_CONNECTION_STRING
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: beeai-secrets
                  key: JWT_SECRET_KEY
            - name: AI_FOUNDRY_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: beeai-secrets
                  key: AI_FOUNDRY_ENDPOINT
            - name: CONTENT_SAFETY_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: beeai-secrets
                  key: CONTENT_SAFETY_ENDPOINT
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
