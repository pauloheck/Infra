###############################################################################
# Gateway NGINX — ConfigMap
# Roteamento centralizado: único ponto de entrada (LoadBalancer) para todos os
# serviços internos (ClusterIP). Replicação do ops/nginx/nginx.conf com nomes
# de serviço Kubernetes.
###############################################################################
apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-nginx-config
  namespace: beeai-prod
data:
  nginx.conf: |
    events {
        worker_connections 1024;
    }

    http {
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 10s;

        upstream api_backend {
            server beeai-api:8000;
        }

        upstream ai_backend {
            server beeai-ai:8001;
        }

        upstream web_backend {
            server beeai-web:3000;
        }

        # Rate limiting: 10 req/min por IP nos paths de IA
        limit_req_zone $binary_remote_addr zone=ai_limit:10m rate=10r/m;

        server {
            listen 80;

            # ── MCP tools → ai-service ──────────────────────────────────────
            location /mcp/ {
                limit_req zone=ai_limit burst=5 nodelay;
                proxy_pass http://ai_backend;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            }

            # ── AI chat (SSE) → ai-service ──────────────────────────────────
            location ~ ^/orgs/[^/]+/ai(/.*)?$ {
                limit_req zone=ai_limit burst=3 nodelay;
                client_max_body_size 10m;
                proxy_pass http://ai_backend;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_buffering off;
                proxy_cache off;
                add_header X-Accel-Buffering no;
                proxy_read_timeout 600s;
            }

            # ── API endpoints → api service ─────────────────────────────────
            location ~ ^/(auth|me|orgs|apiaries|inspections|harvests|queens|events|admin|public|health)(/.*)?$ {
                proxy_pass http://api_backend;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            }

            # ── Gateway health (para K8s probes) ────────────────────────────
            location = /gateway-health {
                access_log off;
                return 200 "ok\n";
                add_header Content-Type text/plain;
            }

            # ── Frontend → web service ──────────────────────────────────────
            location / {
                proxy_pass http://web_backend;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
            }
        }
    }
