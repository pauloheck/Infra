###############################################################################
# SecretProviderClass — lê secrets do Azure Key Vault e cria um K8s Secret.
# Requer: secrets-store-csi-driver + azure-key-vault-provider instalados no AKS.
###############################################################################
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: beeai-kv-secrets
  namespace: beeai-prod
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    clientID: ""           # vazio = usa Managed Identity do node pool
    keyvaultName: "kv-beeai-prod"
    objects: |
      array:
        - |
          objectName: pg-connection-string
          objectType: secret
        - |
          objectName: jwt-secret-key
          objectType: secret
        - |
          objectName: ai-foundry-endpoint
          objectType: secret
        - |
          objectName: content-safety-endpoint
          objectType: secret
    tenantId: ""           # preenchido automaticamente via Managed Identity
  secretObjects:
    - secretName: beeai-secrets
      type: Opaque
      data:
        - objectName: pg-connection-string
          key: DB_CONNECTION_STRING
        - objectName: jwt-secret-key
          key: JWT_SECRET_KEY
        - objectName: ai-foundry-endpoint
          key: AI_FOUNDRY_ENDPOINT
        - objectName: content-safety-endpoint
          key: CONTENT_SAFETY_ENDPOINT
