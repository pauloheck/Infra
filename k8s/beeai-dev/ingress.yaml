###############################################################################
# Ingress — roteamento externo para API e Web
# Requer: NGINX Ingress Controller instalado no AKS.
# Substituir <EXTERNAL_IP_OR_DOMAIN> pelo IP/domínio real.
###############################################################################
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: beeai-ingress
  namespace: beeai-dev
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    # SSE requires buffering off
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    # TLS: cert-manager (descomente após configurar cert-manager)
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  # tls:
  #   - hosts:
  #       - api.beeai.io
  #       - app.beeai.io
  #     secretName: beeai-tls
  rules:
    - host: api.beeai.io          # substituir pelo domínio real
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: beeai-api
                port:
                  number: 80
    - host: app.beeai.io          # substituir pelo domínio real
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: beeai-web
                port:
                  number: 80
