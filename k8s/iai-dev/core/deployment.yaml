###############################################################################
# Deployment — IAI Core (Python/FastAPI)
# Imagem: acrheckiodev.azurecr.io/iai-core:<TAG>   (substituir TAG no deploy)
###############################################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iai-core
  namespace: iai-dev
  labels:
    app: iai-core
    version: "latest"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: iai-core
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: iai-core
    spec:
      serviceAccountName: default
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: core
          image: acrheckiodev.azurecr.io/iai-core:latest   # substituído pelo CI/CD
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: iai-core-config
          env:
            - name: AZURE_OPENAI_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: iai-secrets
                  key: AZURE_OPENAI_ENDPOINT
            - name: AZURE_OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: iai-secrets
                  key: AZURE_OPENAI_API_KEY
            - name: DEVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: iai-secrets
                  key: DEVICE_TOKEN
            - name: APPLICATIONINSIGHTS_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: iai-secrets
                  key: APPLICATIONINSIGHTS_CONNECTION_STRING
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
