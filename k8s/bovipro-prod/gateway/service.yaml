###############################################################################
# Service — BoviPro Gateway (único LoadBalancer público)
# API e Web são ClusterIP — acesso somente via este gateway.
# AKS compartilha o Standard Load Balancer: IP público separado, sem custo extra.
###############################################################################
apiVersion: v1
kind: Service
metadata:
  name: bovipro-gateway
  namespace: bovipro-prod
  labels:
    app: bovipro-gateway
  annotations:
    service.beta.kubernetes.io/azure-load-balancer-internal: "true"
spec:
  type: LoadBalancer
  loadBalancerIP: "10.10.15.201"
  selector:
    app: bovipro-gateway
  ports:
    - name: http
      port: 80
      targetPort: 80
