###############################################################################
# Service — BoviPro Gateway (LoadBalancer com IP estático)
# IP público fixo criado via Terraform (pip-bovipro-prod em rg-shared-dev).
# DNS: bovipro.com.br → 52.251.92.30
###############################################################################
apiVersion: v1
kind: Service
metadata:
  name: bovipro-gateway
  namespace: bovipro-prod
  labels:
    app: bovipro-gateway
  annotations:
    service.beta.kubernetes.io/azure-load-balancer-resource-group: "rg-shared-dev"
spec:
  type: LoadBalancer
  loadBalancerIP: "52.251.92.30"
  selector:
    app: bovipro-gateway
  ports:
    - name: http
      port: 80
      targetPort: 80
