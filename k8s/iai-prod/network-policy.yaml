###############################################################################
# NetworkPolicy — IAI namespace (prod)
# IAI é um serviço único com LoadBalancer direto (sem gateway).
###############################################################################

# Core: aceita tráfego externo (LoadBalancer) na porta 8000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-external-to-core
  namespace: iai-prod
spec:
  podSelector:
    matchLabels:
      app: iai-core
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: 8000

# Egress: pods podem fazer chamadas externas (Azure OpenAI, Key Vault, etc.)
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-all
  namespace: iai-prod
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - {}
