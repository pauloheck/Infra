###############################################################################
# SecretProviderClass — lê secrets do Key Vault kv-iai-prod.
# Requer: secrets-store-csi-driver + azure-key-vault-provider no AKS.
###############################################################################
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: iai-kv-secrets
  namespace: iai-prod
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    clientID: ""           # vazio = usa Managed Identity do node pool
    keyvaultName: "kv-iai-prod"
    objects: |
      array:
        - |
          objectName: azure-openai-endpoint
          objectType: secret
        - |
          objectName: azure-openai-api-key
          objectType: secret
        - |
          objectName: device-token
          objectType: secret
        - |
          objectName: appinsights-connection-string
          objectType: secret
    tenantId: ""           # preenchido automaticamente via Managed Identity
  secretObjects:
    - secretName: iai-secrets
      type: Opaque
      data:
        - objectName: azure-openai-endpoint
          key: AZURE_OPENAI_ENDPOINT
        - objectName: azure-openai-api-key
          key: AZURE_OPENAI_API_KEY
        - objectName: device-token
          key: DEVICE_TOKEN
        - objectName: appinsights-connection-string
          key: APPLICATIONINSIGHTS_CONNECTION_STRING
