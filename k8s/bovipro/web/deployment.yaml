###############################################################################
# Deployment — BoviPro Web (Next.js 14 standalone)
# NEXT_PUBLIC_API_BASE_URL é baked na imagem durante o build do CI/CD.
###############################################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bovipro-web
  namespace: bovipro
  labels:
    app: bovipro-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bovipro-web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: bovipro-web
    spec:
      containers:
        - name: web
          image: acrheckiodev.azurecr.io/bovipro-web:latest   # substituído pelo CI/CD
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: bovipro-web-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
