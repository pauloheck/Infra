###############################################################################
# Service — BoviPro Gateway (LoadBalancer com IP estático)
# IP público fixo criado via Terraform (pip-bovipro-dev em rg-shared-dev).
# DNS: dev.bovipro.com.br → 137.116.71.62
###############################################################################
apiVersion: v1
kind: Service
metadata:
  name: bovipro-gateway
  namespace: bovipro-dev
  labels:
    app: bovipro-gateway
  annotations:
    service.beta.kubernetes.io/azure-load-balancer-resource-group: "rg-shared-dev"
spec:
  type: LoadBalancer
  loadBalancerIP: "137.116.71.62"
  selector:
    app: bovipro-gateway
  ports:
    - name: http
      port: 80
      targetPort: 80
