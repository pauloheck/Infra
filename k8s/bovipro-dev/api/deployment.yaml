###############################################################################
# Deployment — BoviPro API (Rust/Axum)
###############################################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bovipro-api
  namespace: bovipro-dev
  labels:
    app: bovipro-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bovipro-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: bovipro-api
    spec:
      serviceAccountName: default
      containers:
        - name: api
          image: acrheckiodev.azurecr.io/bovipro-api:latest   # substituído pelo CI/CD
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: bovipro-api-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: bovipro-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: bovipro-secrets
                  key: JWT_SECRET
          volumeMounts:
            - name: secrets-store
              mountPath: "/mnt/secrets-store"
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 3
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: bovipro-kv-secrets
